name: "u_${USER}_itoticket_dev"

x-buildargs-config: &buildargs-config
  BUILD_VERSION: "development"
  REQUIREMENTS_FILE: "requirements.txt"
  COMMIT_ID: "devonly"
  UID: "1000"
  GID: "1000"

x-app-config: &app-config
  POSTGRES_PASSWORD: "PlsChgMePostgres"
  POSTGRES_USER: "itoticketing"
  POSTGRES_DB: "itoticketing"
  CACHE_PASSWORD: "PlsChgMeCache"
  DJANGO_DEBUG: "True"

services:
  workspace:
    image: localhost.local/itoticketing-dev:latest
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
      args: *buildargs-config
    command: sleep infinity
    environment:
      <<: *app-config
    volumes:
      - ../../..:/workspaces:cached
    depends_on:
      - database
      - cache
    networks:
      - dev_internal

  webapp:
    image: localhost.local/itoticketing-dev:latest
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
      args: *buildargs-config
    working_dir: /workspace
    # run a development server for django and make it available on port 8000
    command: '/bin/bash -c "make webapp-runserver"'
    environment:
      <<: *app-config
    volumes:
      - ../..:/workspace:cached
    depends_on:
      - database
      - cache
    networks:
      - dev_internal
    ports:
      - "8000:8000"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.26.1
    profiles:
      - n8n
    environment:
      N8N_HOST: "n8n"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      N8N_EDITOR_BASE_URL: "http://localhost:5678/"
      N8N_RUNNERS_MODE: "external"
      N8N_RUNNERS_AUTH_TOKEN: "dev-n8n-runner-token"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
      N8N_NATIVE_PYTHON_RUNNER: "true"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "UTC"
      TZ: "UTC"
    volumes:
      - n8n-data:/home/node/.n8n
      - ${LOCAL_WORKSPACE_FOLDER}/.devcontainer/development/n8n/custom/node_modules/n8n-nodes-ticket-system-mock:/home/node/.n8n/custom/node_modules/n8n-nodes-ticket-system-mock:ro
      - ${LOCAL_WORKSPACE_FOLDER}/.devcontainer/development/n8n/local-files:/files
    networks:
      - dev_internal
    ports:
      - "5678:5678"

  n8n-runners:
    image: n8nio/runners:2.26.1
    profiles:
      - n8n
    environment:
      N8N_RUNNERS_AUTH_TOKEN: "dev-n8n-runner-token"
      N8N_RUNNERS_TASK_BROKER_URI: "http://n8n:5679"
      GENERIC_TIMEZONE: "UTC"
      TZ: "UTC"
    depends_on:
      - n8n
    networks:
      - dev_internal

  database:
    image: postgres:18
    environment:
      <<: *app-config
    command: "postgres -c 'max_connections=1000' -c 'tcp_keepalives_idle=120' -c 'tcp_keepalives_interval=15' -c 'tcp_keepalives_count=4'"
    #ports:
    #  - "5432:5432"
    networks:
      - dev_internal
    volumes:
      - postgres-data:/var/lib/postgresql

  cache:
    image: redis:8
    environment:
      <<: *app-config
    networks:
      - dev_internal
    command: "redis-server --save 900 1 --save 300 10 --save 60 10000 --appendonly yes --appendfsync everysec --no-appendfsync-on-rewrite yes --tcp-keepalive 300 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${CACHE_PASSWORD:-PlsChgMeRedis}"
    volumes:
      - redis-data:/data

    #ports:
    #  - "6379:6379"

networks:
  dev_internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  n8n-data:
