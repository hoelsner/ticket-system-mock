name: Publish Webapp Image

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: hoelsner/ticket-system-mock
      IMAGE_TAG: latest
      BUILD_VERSION: latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish latest multi-architecture image
        run: bash scripts/cicd/publish_webapp_image.bash

      - name: Generate deployment bundle
        run: bash deploy/build_scripts/create_build_bundle.bash "$BUILD_VERSION" "$IMAGE_REPOSITORY:$IMAGE_TAG" "$(git rev-parse --short=12 HEAD)"

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-${{ env.BUILD_VERSION }}
          path: build/deploy/*.zip
          if-no-files-found: error
