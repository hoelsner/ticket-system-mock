# Docker Compose template for production-style deployment.
# Copy this file to the repository root as docker-compose.yaml before use.

x-webapp-environment: &webapp-environment
  DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
  DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me}"
  DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
  DJANGO_TIME_ZONE: "${DJANGO_TIME_ZONE:-UTC}"
  DJANGO_LOG_LEVEL: "${DJANGO_LOG_LEVEL:-INFO}"
  SERVICE_BASE_URL: "${SERVICE_BASE_URL:-https://localhost:8443}"
  DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-https://localhost:8443}"
  DJANGO_SESSION_COOKIE_NAME: "${DJANGO_SESSION_COOKIE_NAME:-ticket-system-mock-sessionid}"
  DJANGO_CSRF_COOKIE_NAME: "${DJANGO_CSRF_COOKIE_NAME:-ticket-system-mock-csrftoken}"
  DJANGO_RUNTIME_ROOT: "/runtime"
  DJANGO_STATIC_ROOT: "/runtime/static"
  DJANGO_MEDIA_ROOT: "/runtime/media"
  DJANGO_CERT_ROOT: "/runtime/certificates"
  DJANGO_PROVISIONING_DIR: "/runtime/provisioning"
  DJANGO_PROVISIONING_FLAG: "/runtime/provisioning/fixtures-loaded.flag"
  DJANGO_BOOTSTRAP_FIXTURES: "${DJANGO_BOOTSTRAP_FIXTURES:-initial_data}"
  DJANGO_STATIC_FIXTURES: "${DJANGO_STATIC_FIXTURES:-static_data}"
  POSTGRES_DB: "${POSTGRES_DB:-itoticketing}"
  POSTGRES_USER: "${POSTGRES_USER:-itoticketing}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-PlsChgMePostgres}"
  POSTGRES_HOST: "database"
  POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
  CACHE_HOST: "cache"
  CACHE_PORT: "${CACHE_PORT:-6379}"
  CACHE_DB: "${CACHE_DB:-0}"
  CACHE_PASSWORD: "${CACHE_PASSWORD:-PlsChgMeCache}"
  NGINX_SERVER_NAME: "${NGINX_SERVER_NAME:-localhost}"
  NGINX_CLIENT_MAX_BODY_SIZE: "${NGINX_CLIENT_MAX_BODY_SIZE:-10m}"

x-service-logging: &service-logging
  driver: json-file
  options:
    max-size: "100m"

services:
  database:
    image: ${POSTGRES_IMAGE:-postgres:18}
    restart: unless-stopped
    logging: *service-logging
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-itoticketing}"
      POSTGRES_USER: "${POSTGRES_USER:-itoticketing}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-PlsChgMePostgres}"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - application

  cache:
    image: ${REDIS_IMAGE:-redis:8}
    restart: unless-stopped
    logging: *service-logging
    command:
      - redis-server
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${CACHE_PASSWORD:-PlsChgMeCache}
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${CACHE_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      CACHE_PASSWORD: "${CACHE_PASSWORD:-PlsChgMeCache}"
    volumes:
      - redis-data:/data
    networks:
      - application

  management:
    image: ${WEBAPP_IMAGE:-hoelsner/ticket-system-mock:latest}
    restart: "no"
    logging: *service-logging
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment: *webapp-environment
    command:
      - /bin/bash
      - -ec
      - |
          /bin/bash /app/deploy/containers/webapp/run_management.bash
          tail -f /dev/null
    healthcheck:
      test:
        - CMD-SHELL
        - test -f "$${DJANGO_PROVISIONING_FLAG}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - runtime:/runtime
    networks:
      - application

  webapp:
    image: ${WEBAPP_IMAGE:-hoelsner/ticket-system-mock:latest}
    restart: unless-stopped
    logging: *service-logging
    depends_on:
      management:
        condition: service_healthy
    environment: *webapp-environment
    command:
      - /bin/bash
      - /app/deploy/containers/webapp/run_webapp.bash
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - "8000"
    volumes:
      - runtime:/runtime
    networks:
      - application

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.31}
    restart: unless-stopped
    logging: *service-logging
    depends_on:
      webapp:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
          cp /runtime/nginx/default.conf /etc/nginx/conf.d/default.conf
          exec nginx -g 'daemon off;'
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-check-certificate -q --spider https://127.0.0.1/
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - runtime:/runtime:ro
    networks:
      - application

volumes:
  runtime:
  postgres-data:
  redis-data:

networks:
  application:
    driver: bridge
