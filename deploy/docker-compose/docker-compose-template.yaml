# Docker Compose template for production-style deployment.
# Copy this file to the repository root as docker-compose.yaml before use.

x-webapp-environment: &webapp-environment
  DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
  DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me}"
  DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
  DJANGO_TIME_ZONE: "${DJANGO_TIME_ZONE:-UTC}"
  DJANGO_LOG_LEVEL: "${DJANGO_LOG_LEVEL:-INFO}"
  DJANGO_RUNTIME_ROOT: "/runtime"
  DJANGO_STATIC_ROOT: "/runtime/static"
  DJANGO_MEDIA_ROOT: "/runtime/media"
  DJANGO_CERT_ROOT: "/runtime/certificates"
  DJANGO_PROVISIONING_DIR: "/runtime/provisioning"
  DJANGO_PROVISIONING_FLAG: "/runtime/provisioning/fixtures-loaded.flag"
  POSTGRES_DB: "${POSTGRES_DB:-itoticketing}"
  POSTGRES_USER: "${POSTGRES_USER:-itoticketing}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-PlsChgMePostgres}"
  POSTGRES_HOST: "database"
  POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
  CACHE_HOST: "cache"
  CACHE_PORT: "${CACHE_PORT:-6379}"
  CACHE_DB: "${CACHE_DB:-0}"
  CACHE_PASSWORD: "${CACHE_PASSWORD:-PlsChgMeCache}"

services:
  database:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-itoticketing}"
      POSTGRES_USER: "${POSTGRES_USER:-itoticketing}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-PlsChgMePostgres}"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - application

  cache:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${CACHE_PASSWORD:-PlsChgMeCache}
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${CACHE_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      CACHE_PASSWORD: "${CACHE_PASSWORD:-PlsChgMeCache}"
    volumes:
      - redis-data:/data
    networks:
      - application

  management:
    image: ${WEBAPP_IMAGE:-itoperation-ticketing-demo-service:latest}
    restart: "no"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment: *webapp-environment
    command:
      - /bin/bash
      - /app/deploy/containers/webapp/run_management.bash
    volumes:
      - runtime:/runtime
    networks:
      - application

  webapp:
    image: ${WEBAPP_IMAGE:-itoperation-ticketing-demo-service:latest}
    restart: unless-stopped
    depends_on:
      management:
        condition: service_completed_successfully
    environment: *webapp-environment
    command:
      - /bin/bash
      - /app/deploy/containers/webapp/run_webapp.bash
    expose:
      - "8000"
    volumes:
      - runtime:/runtime
    networks:
      - application

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      webapp:
        condition: service_started
    environment:
      NGINX_SERVER_NAME: "${NGINX_SERVER_NAME:-_}"
      NGINX_CLIENT_MAX_BODY_SIZE: "${NGINX_CLIENT_MAX_BODY_SIZE:-10m}"
    command:
      - /bin/sh
      - -ec
      - |
          cat >/etc/nginx/conf.d/default.conf <<EOF
          upstream django_upstream {
              server webapp:8000;
          }

          server {
              listen 80;
              server_name ${NGINX_SERVER_NAME:-_};
              client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE:-10m};

              location /static/ {
                  alias /runtime/static/;
                  access_log off;
                  expires 1h;
                  add_header Cache-Control "public";
              }

              location /media/ {
                  alias /runtime/media/;
                  access_log off;
                  expires 1h;
                  add_header Cache-Control "public";
              }

              location / {
                  proxy_pass http://django_upstream;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_set_header X-Real-IP $$remote_addr;
              }
          }
          EOF
          exec nginx -g 'daemon off;'
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - runtime:/runtime:ro
    networks:
      - application

volumes:
  runtime:
  postgres-data:
  redis-data:

networks:
  application:
    driver: bridge
