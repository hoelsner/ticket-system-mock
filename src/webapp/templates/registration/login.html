{% extends "base.html" %}

{% block content %}
  <section class="auth-layout">
    <article class="auth-layout__form-panel">
      <h1>Sign in</h1>
      <p>Login using your credentials.</p>

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <label>
          Username
          {{ form.username }}
        </label>

        <label>
          Password
          {{ form.password }}
        </label>

        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="app-inline-icon-link">{% include "includes/icon.html" with name="login" %}<span>Sign in</span></button>
      </form>
    </article>

    <aside class="auth-layout__illustration-panel" aria-hidden="true">
      <img src="{{ app_branding.login_background_url }}" alt="" class="auth-layout__illustration-image">
    </aside>
  </section>
{% endblock %}
