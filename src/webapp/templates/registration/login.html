{% extends "base.html" %}

{% block content %}
  <article>
    <h1>Sign in</h1>
    <p>Use your Django session credentials to access the user frontend.</p>

    {% if form.errors %}
      <p>Username and password did not match. Please try again.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <label>
        Username
        {{ form.username }}
      </label>

      <label>
        Password
        {{ form.password }}
      </label>

      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Sign in</button>
    </form>
  </article>
{% endblock %}
